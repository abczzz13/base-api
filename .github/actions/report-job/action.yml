name: Report Job
description: Write a job summary and optionally upload an artifact bundle.

inputs:
  title:
    description: Summary title without markdown heading markers.
    required: true
  summary:
    description: Markdown body to append after the title.
    required: true
  artifact-name:
    description: Artifact bundle name.
    required: false
    default: ""
  artifact-path:
    description: Artifact path to upload.
    required: false
    default: ""
  retention-days:
    description: Artifact retention period in days.
    required: false
    default: "14"
  if-no-files-found:
    description: Upload behavior when no artifact files are found.
    required: false
    default: warn

runs:
  using: composite
  steps:
    - name: Write job summary
      shell: bash
      env:
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_SUMMARY: ${{ inputs.summary }}
      run: |
        set -euo pipefail

        {
          printf '## %s\n\n' "$INPUT_TITLE"
          printf '%s\n' "$INPUT_SUMMARY"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload artifact bundle
      if: inputs.artifact-name != '' && inputs.artifact-path != ''
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
