name: Run Lint
description: Run lint and drift checks, then publish logs and summary.

inputs:
  command:
    description: Command to execute for lint and drift checks.
    required: false
    default: just tools && just fmt-go-check lint sqlc-check ogen-check vendor-check
  artifact-name:
    description: Uploaded artifact bundle name.
    required: false
    default: lint-logs
  retention-days:
    description: Artifact retention period in days.
    required: false
    default: "14"

runs:
  using: composite
  steps:
    - name: Prepare / Workspace
      uses: ./.github/actions/prepare-workspace
      with:
        cache-tools: "true"

    - name: Verify / Run lint checks
      id: lint_checks
      shell: bash
      run: |
        set -euo pipefail
        ${{ inputs.command }} 2>&1 | tee artifacts/lint.log

    - name: Report / Publish results
      if: always()
      uses: ./.github/actions/report-job
      with:
        title: Lint
        summary: |
          | Item | Result |
          | --- | --- |
          | Lint checks | ${{ steps.lint_checks.outcome }} |
          | Command | `${{ inputs.command }}` |
          | Artifacts | `${{ inputs.artifact-name }}` |
        artifact-name: ${{ inputs.artifact-name }}
        artifact-path: artifacts/
        retention-days: ${{ inputs.retention-days }}
