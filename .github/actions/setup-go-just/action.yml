name: Setup Go And Just
description: Setup Go, just, optional tool caching, and an artifacts directory.

inputs:
  setup-go:
    description: Install Go from go-version-file.
    default: "true"
  go-version-file:
    description: Path to the Go version file.
    default: go.mod
  setup-just:
    description: Install just.
    default: "true"
  cache-tools:
    description: Restore and save the local .bin cache.
    default: "false"
  create-artifacts-dir:
    description: Create the artifacts directory.
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Go
      if: inputs.setup-go == 'true'
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: true

    - name: Setup just
      if: inputs.setup-just == 'true'
      uses: taiki-e/install-action@5ab5d1729c22acd8f798b267eadcfe5e5be6f5c2 # v2.68.27
      with:
        tool: just

    - name: Cache local tool binaries
      if: inputs.cache-tools == 'true'
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .bin
        key: ${{ runner.os }}-bin-${{ hashFiles('justfile') }}

    - name: Create artifacts directory
      if: inputs.create-artifacts-dir == 'true'
      shell: bash
      run: mkdir -p artifacts
