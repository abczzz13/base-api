name: CI
run-name: CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  repo-checks:
    name: Quality / Repo Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      DB_URL: postgres://postgres:postgres@127.0.0.1:5432/base_api?sslmode=disable
      TEST_DB_URL: postgres://postgres:postgres@127.0.0.1:5432/base_api?sslmode=disable
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: base_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d base_api" --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Prepare / Setup toolchain
        uses: ./.github/actions/setup-go-just
        with:
          cache-tools: "true"

      - name: Verify / Run repo checks
        id: repo_checks
        run: |
          set -euo pipefail
          just tools 2>&1 | tee artifacts/ci-tools.log
          just check 2>&1 | tee artifacts/ci-check.log

      - name: Report / Job summary
        if: always()
        run: |
          {
            echo "## Quality / Repo Checks"
            echo
            echo "| Item | Result |"
            echo "| --- | --- |"
            echo "| Repo checks | ${{ steps.repo_checks.outcome }} |"
            echo "| PostgreSQL service | enabled |"
            echo "| Commands | \`just tools\`, \`just check\` |"
            echo "| Artifacts | \`ci-repo-checks-logs\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report / Upload logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-repo-checks-logs
          path: artifacts/
          retention-days: 14

  image-validation:
    name: Quality / Image Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Setup toolchain
        uses: ./.github/actions/setup-go-just
        with:
          setup-go: "false"
          setup-just: "true"

      - name: Verify / Build runtime image
        id: image_validation
        run: |
          set -euo pipefail
          just build-image-ci 2>&1 | tee artifacts/image-validation.log

      - name: Report / Job summary
        if: always()
        run: |
          {
            echo "## Quality / Image Validation"
            echo
            echo "| Item | Result |"
            echo "| --- | --- |"
            echo "| Runtime image build | ${{ steps.image_validation.outcome }} |"
            echo "| Command | \`just build-image\` |"
            echo "| Artifacts | \`ci-image-validation-logs\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report / Upload logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-image-validation-logs
          path: artifacts/
          retention-days: 14
