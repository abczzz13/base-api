name: Deploy
run-name: Deploy / ${{ inputs.environment }} / ${{ inputs.publish-run-id }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment.
        required: true
        type: choice
        options:
          - test
          - production
      publish-run-id:
        description: Successful Publish workflow run id to promote.
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Deploy / Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      publish-run-id: ${{ steps.run.outputs.run_id }}
      publish-run-url: ${{ steps.run.outputs.run_url }}
      run-event: ${{ steps.run.outputs.run_event }}
      image-ref: ${{ steps.metadata.outputs.image_ref }}
      source-ref: ${{ steps.metadata.outputs.source_ref }}
      source-ref-name: ${{ steps.metadata.outputs.source_ref_name }}
      source-type: ${{ steps.metadata.outputs.source_type }}
      source-sha: ${{ steps.metadata.outputs.source_sha }}
    steps:
      - name: Validate / Resolve delivery run
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id='${{ inputs.publish-run-id }}'
          api_headers=(-H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' -H "Authorization: Bearer $GH_TOKEN")

          case "$run_id" in
            ''|*[!0-9]*)
              printf '::error::publish-run-id must be a numeric GitHub Actions run id.\n'
              exit 1
              ;;
          esac

          run_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          run_json="$(curl -fsSL "${api_headers[@]}" "$run_api")"

          workflow_path="$(jq -r '.path // empty' <<<"$run_json")"
          status="$(jq -r '.status // empty' <<<"$run_json")"
          conclusion="$(jq -r '.conclusion // empty' <<<"$run_json")"
          run_url="$(jq -r '.html_url // empty' <<<"$run_json")"
          run_event="$(jq -r '.event // empty' <<<"$run_json")"
          head_branch="$(jq -r '.head_branch // empty' <<<"$run_json")"
          head_sha="$(jq -r '.head_sha // empty' <<<"$run_json")"
          head_repository="$(jq -r '.head_repository.full_name // empty' <<<"$run_json")"

          case "$workflow_path" in
            .github/workflows/publish.yml|.github/workflows/publish.yml@*)
              ;;
            *)
              printf '::error::Run %s is not from the Publish workflow.\n' "$run_id"
              exit 1
              ;;
          esac

          if [ "$status" != 'completed' ] || [ "$conclusion" != 'success' ]; then
            printf '::error::Run %s is not a successful completed Publish run (status=%s, conclusion=%s).\n' "$run_id" "$status" "$conclusion"
            exit 1
          fi

          if [ -z "$run_event" ] || [ -z "$head_branch" ] || [ -z "$head_sha" ]; then
            printf '::error::Run %s is missing required GitHub source metadata (event=%s, head_branch=%s, head_sha=%s).\n' "$run_id" "$run_event" "$head_branch" "$head_sha"
            exit 1
          fi

          if [ "$head_repository" != "$GITHUB_REPOSITORY" ]; then
            printf '::error::Run %s originates from %s, expected %s.\n' "$run_id" "${head_repository:-<unknown>}" "$GITHUB_REPOSITORY"
            exit 1
          fi

          artifacts_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100"
          artifacts_json="$(curl -fsSL "${api_headers[@]}" "$artifacts_api")"

          if ! jq -e '.artifacts[]? | select(.name == "publish-metadata" and .expired == false)' >/dev/null <<<"$artifacts_json"; then
            printf '::error::Run %s does not expose a usable publish-metadata artifact.\n' "$run_id"
            exit 1
          fi

          printf 'run_id=%s\n' "$run_id" >> "$GITHUB_OUTPUT"
          printf 'run_url=%s\n' "$run_url" >> "$GITHUB_OUTPUT"
          printf 'run_event=%s\n' "$run_event" >> "$GITHUB_OUTPUT"
          printf 'head_branch=%s\n' "$head_branch" >> "$GITHUB_OUTPUT"
          printf 'head_sha=%s\n' "$head_sha" >> "$GITHUB_OUTPUT"

      - name: Validate / Download trusted metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: publish-metadata
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.run.outputs.run_id }}
          path: artifacts/input

      - name: Validate / Check promotion policy
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          metadata_file='artifacts/input/publish-metadata.json'
          api_headers=(-H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' -H "Authorization: Bearer $GH_TOKEN")

          if [ ! -f "$metadata_file" ]; then
            printf '::error::Trusted delivery metadata was not downloaded.\n'
            exit 1
          fi

          repository="$(jq -r '.repository // empty' "$metadata_file")"
          run_id="$(jq -r '.run_id // empty' "$metadata_file")"
          event_name="$(jq -r '.event_name // empty' "$metadata_file")"
          image_ref="$(jq -r '.image_ref // empty' "$metadata_file")"
          push_image="$(jq -r 'if .push_image == true then "true" else "false" end' "$metadata_file")"
          source_repository="$(jq -r '.source_repository // empty' "$metadata_file")"
          source_ref="$(jq -r '.source_ref // empty' "$metadata_file")"
          source_ref_name="$(jq -r '.source_ref_name // empty' "$metadata_file")"
          source_type="$(jq -r '.source_type // empty' "$metadata_file")"
          source_sha="$(jq -r '.source_sha // empty' "$metadata_file")"
          head_branch='${{ steps.run.outputs.head_branch }}'
          head_sha='${{ steps.run.outputs.head_sha }}'
          run_event='${{ steps.run.outputs.run_event }}'

          if [ "$repository" != "$GITHUB_REPOSITORY" ]; then
            printf '::error::Trusted metadata belongs to %s, expected %s.\n' "$repository" "$GITHUB_REPOSITORY"
            exit 1
          fi

          if [ "$source_repository" != "$GITHUB_REPOSITORY" ]; then
            printf '::error::Trusted metadata source repository is %s, expected %s.\n' "$source_repository" "$GITHUB_REPOSITORY"
            exit 1
          fi

          if [ "$run_id" != '${{ steps.run.outputs.run_id }}' ]; then
            printf '::error::Trusted metadata run id %s does not match requested run %s.\n' "$run_id" '${{ steps.run.outputs.run_id }}'
            exit 1
          fi

          if [ "$event_name" != "$run_event" ]; then
            printf '::error::Trusted metadata event %s does not match GitHub run event %s.\n' "$event_name" "$run_event"
            exit 1
          fi

          if [ "$push_image" != 'true' ]; then
            printf '::error::Publish run %s did not publish a deployable registry image.\n' "$run_id"
            exit 1
          fi

          if [ "$source_sha" != "$head_sha" ]; then
            printf '::error::Trusted metadata source SHA %s does not match GitHub run SHA %s.\n' "$source_sha" "$head_sha"
            exit 1
          fi

          if [ "$source_ref_name" != "$head_branch" ]; then
            printf '::error::Trusted metadata source ref name %s does not match GitHub run branch/tag %s.\n' "$source_ref_name" "$head_branch"
            exit 1
          fi

          case "$source_type" in
            branch)
              expected_source_ref="refs/heads/${head_branch}"
              ;;
            tag)
              expected_source_ref="refs/tags/${head_branch}"
              ;;
            *)
              printf '::error::Trusted metadata source_type %s is not supported.\n' "$source_type"
              exit 1
              ;;
          esac

          if [ "$source_ref" != "$expected_source_ref" ]; then
            printf '::error::Trusted metadata source ref %s does not match expected %s.\n' "$source_ref" "$expected_source_ref"
            exit 1
          fi

          case "$image_ref" in
            *@sha256:*)
              ;;
            *)
              printf '::error::Trusted metadata image_ref %s is not an immutable digest reference.\n' "$image_ref"
              exit 1
              ;;
          esac

          if [ '${{ inputs.environment }}' = 'production' ]; then
            if [ "$run_event" != 'push' ]; then
              printf '::error::Production deploys require a tag-push Publish run; got event %s.\n' "$run_event"
              exit 1
            fi

            if [ "$source_type" != 'tag' ] || [[ ! "$source_ref_name" == v* ]]; then
              printf '::error::Production deploys require a Publish run built from a v* tag; got %s (%s).\n' "$source_type" "$source_ref"
              exit 1
            fi

            tag_ref_encoded="$(jq -rn --arg ref "tags/${source_ref_name}" '$ref | @uri')"
            tag_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/${tag_ref_encoded}"

            if ! tag_json="$(curl -fsSL "${api_headers[@]}" "$tag_api")"; then
              printf '::error::Production deploys require tag %s to exist in %s.\n' "$source_ref_name" "$GITHUB_REPOSITORY"
              exit 1
            fi

            tag_object_type="$(jq -r '.object.type // empty' <<<"$tag_json")"
            tag_object_sha="$(jq -r '.object.sha // empty' <<<"$tag_json")"

            case "$tag_object_type" in
              commit)
                tag_commit_sha="$tag_object_sha"
                ;;
              tag)
                tag_object_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}"
                tag_object_json="$(curl -fsSL "${api_headers[@]}" "$tag_object_api")"
                nested_type="$(jq -r '.object.type // empty' <<<"$tag_object_json")"
                tag_commit_sha="$(jq -r '.object.sha // empty' <<<"$tag_object_json")"

                if [ "$nested_type" != 'commit' ] || [ -z "$tag_commit_sha" ]; then
                  printf '::error::Tag %s does not resolve to a commit.\n' "$source_ref_name"
                  exit 1
                fi
                ;;
              *)
                printf '::error::Tag %s resolved to unexpected object type %s.\n' "$source_ref_name" "$tag_object_type"
                exit 1
                ;;
            esac

            if [ "$tag_commit_sha" != "$head_sha" ]; then
              printf '::error::Tag %s resolves to %s, but the Publish run built %s.\n' "$source_ref_name" "$tag_commit_sha" "$head_sha"
              exit 1
            fi
          fi

          printf 'image_ref=%s\n' "$image_ref" >> "$GITHUB_OUTPUT"
          printf 'source_ref=%s\n' "$source_ref" >> "$GITHUB_OUTPUT"
          printf 'source_ref_name=%s\n' "$source_ref_name" >> "$GITHUB_OUTPUT"
          printf 'source_type=%s\n' "$source_type" >> "$GITHUB_OUTPUT"
          printf 'source_sha=%s\n' "$source_sha" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy / ${{ inputs.environment }}
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    environment: ${{ inputs.environment }}
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare / Setup toolchain
        uses: ./.github/actions/setup-go-just
        with:
          setup-go: "false"
          setup-just: "true"

      - name: Deploy / Run deployment
        id: deploy
        env:
          IMAGE_REF: ${{ needs.validate.outputs.image-ref }}
        run: |
          set -euo pipefail
          if [ '${{ inputs.environment }}' = 'production' ]; then
            just deploy-prod 2>&1 | tee artifacts/deploy.log
          else
            just deploy-test 2>&1 | tee artifacts/deploy.log
          fi

      - name: Report / Notify Slack
        id: slack
        if: always()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          title: Base API ${{ inputs.environment }} deployment
          status: ${{ steps.deploy.outcome == 'success' && 'success' || 'failure' }}
          environment: ${{ inputs.environment }}
          image-ref: ${{ needs.validate.outputs.image-ref }}
          details: Promoted Publish run ${{ needs.validate.outputs.publish-run-id }} (${{ needs.validate.outputs.source-type }} ${{ needs.validate.outputs.source-ref-name }}) to ${{ inputs.environment }}.

      - name: Report / Job summary
        if: always()
        run: |
          {
            echo "## Deploy / ${{ inputs.environment }}"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Deploy result | ${{ steps.deploy.outcome }} |"
            echo "| Slack notification | ${{ steps.slack.outcome }} |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Publish run | \`${{ needs.validate.outputs.publish-run-id }}\` |"
            echo "| Source | \`${{ needs.validate.outputs.source-type }}:${{ needs.validate.outputs.source-ref-name }}\` |"
            echo "| Image | \`${{ needs.validate.outputs.image-ref }}\` |"
            echo "| Artifacts | \`deploy-${{ inputs.environment }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report / Upload deploy log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-${{ inputs.environment }}
          path: artifacts/
          retention-days: 14
