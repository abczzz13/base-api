name: Deploy
run-name: Deploy / ${{ inputs.environment }} / ${{ inputs.publish-run-id }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment.
        required: true
        type: choice
        options:
          - test
          - production
      publish-run-id:
        description: Successful Publish workflow run id to promote.
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Deploy / Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      publish_run_id: ${{ steps.run.outputs.publish_run_id }}
      publish_run_url: ${{ steps.run.outputs.publish_run_url }}
      run_event: ${{ steps.run.outputs.run_event }}
      image_ref: ${{ steps.metadata.outputs.image_ref }}
      source_ref: ${{ steps.metadata.outputs.source_ref }}
      source_ref_name: ${{ steps.metadata.outputs.source_ref_name }}
      source_type: ${{ steps.metadata.outputs.source_type }}
      source_sha: ${{ steps.metadata.outputs.source_sha }}
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Workspace
        uses: ./.github/actions/prepare-workspace
        with:
          setup-go: "false"
          setup-just: "false"

      - name: Validate / Resolve delivery run
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PUBLISH_RUN_ID: ${{ inputs.publish-run-id }}
        run: scripts/deploy/resolve_publish_run.sh

      - name: Validate / Download trusted metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: publish-metadata
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.run.outputs.publish_run_id }}
          path: artifacts/input

      - name: Validate / Check promotion policy
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ steps.run.outputs.head_branch }}
          HEAD_SHA: ${{ steps.run.outputs.head_sha }}
          METADATA_FILE: artifacts/input/publish-metadata.json
          PUBLISH_RUN_ID: ${{ steps.run.outputs.publish_run_id }}
          RUN_EVENT: ${{ steps.run.outputs.run_event }}
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
        run: scripts/deploy/check_promotion_policy.sh

  deploy:
    name: Deploy / ${{ inputs.environment }}
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    environment: ${{ inputs.environment }}
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Workspace
        uses: ./.github/actions/prepare-workspace
        with:
          setup-go: "false"
          setup-just: "true"

      - name: Deploy / Run deployment
        id: deploy
        env:
          IMAGE_REF: ${{ needs.validate.outputs.image_ref }}
        run: |
          set -euo pipefail
          if [ '${{ inputs.environment }}' = 'production' ]; then
            just deploy-prod 2>&1 | tee artifacts/deploy.log
          else
            just deploy-test 2>&1 | tee artifacts/deploy.log
          fi

      - name: Report / Notify Slack
        id: slack
        if: always()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          title: Base API ${{ inputs.environment }} deployment
          status: ${{ steps.deploy.outcome == 'success' && 'success' || 'failure' }}
          environment: ${{ inputs.environment }}
          image-ref: ${{ needs.validate.outputs.image_ref }}
          details: Promoted Publish run ${{ needs.validate.outputs.publish_run_id }} (${{ needs.validate.outputs.source_type }} ${{ needs.validate.outputs.source_ref_name }}) to ${{ inputs.environment }}.

      - name: Report / Publish results
        if: always()
        uses: ./.github/actions/report-job
        with:
          title: Deploy / ${{ inputs.environment }}
          summary: |
            | Item | Value |
            | --- | --- |
            | Deploy result | ${{ steps.deploy.outcome }} |
            | Slack notification | ${{ steps.slack.outcome }} |
            | Environment | `${{ inputs.environment }}` |
            | Publish run | `${{ needs.validate.outputs.publish_run_id }}` |
            | Source | `${{ needs.validate.outputs.source_type }}:${{ needs.validate.outputs.source_ref_name }}` |
            | Image | `${{ needs.validate.outputs.image_ref }}` |
            | Artifacts | `deploy-${{ inputs.environment }}` |
          artifact-name: deploy-${{ inputs.environment }}
          artifact-path: artifacts/
