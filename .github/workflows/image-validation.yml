name: Image Validation
run-name: "Image Validation / ${{ github.event_name }} / ${{ github.event_name == 'pull_request' && format('PR #{0} ({1})', github.event.pull_request.number, github.head_ref) || github.ref_name }}"

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

concurrency:
  group: image-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  image_validation:
    name: Image Validation
    uses: ./.github/workflows/reusable-nix-image-validation.yml
    with:
      artifact_name: image-validation-logs
      retention_days: 14
