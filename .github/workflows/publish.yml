name: Publish
run-name: Publish / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  image_metadata:
    name: Publish / Derive Image Metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      artifact_name: ${{ steps.vars.outputs.artifact_name }}
      build_time: ${{ steps.vars.outputs.build_time }}
      build_platforms: ${{ steps.vars.outputs.build_platforms }}
      git_branch: ${{ steps.vars.outputs.git_branch }}
      git_tag: ${{ steps.vars.outputs.git_tag }}
      image_name: ${{ steps.vars.outputs.image_name }}
      primary_image: ${{ steps.vars.outputs.primary_image }}
      requires_qemu: ${{ steps.vars.outputs.requires_qemu }}
      scan_matrix: ${{ steps.vars.outputs.scan_matrix }}
      source_ref: ${{ steps.vars.outputs.source_ref }}
      source_ref_name: ${{ steps.vars.outputs.source_ref_name }}
      source_repository: ${{ steps.vars.outputs.source_repository }}
      source_sha: ${{ steps.vars.outputs.source_sha }}
      source_type: ${{ steps.vars.outputs.source_type }}
      tags: ${{ steps.vars.outputs.tags }}
      version_value: ${{ steps.vars.outputs.version_value }}
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Workspace
        uses: ./.github/actions/prepare-workspace
        with:
          setup-go: "false"
          setup-just: "false"
          create-artifacts-dir: "false"

      - name: Prepare / Derive image metadata
        id: vars
        run: scripts/publish/derive_image_metadata.sh

  image_scan:
    name: Publish / Build And Scan (${{ matrix.platform_slug }})
    needs: image_metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.image_metadata.outputs.scan_matrix) }}
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Workspace
        uses: ./.github/actions/prepare-workspace
        with:
          setup-go: "false"
          setup-just: "false"

      - name: Prepare / Setup QEMU
        if: needs.image_metadata.outputs.requires_qemu == 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Prepare / Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build / Export scan image archive
        id: build_scan_image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          target: runner
          platforms: ${{ matrix.platform }}
          outputs: type=docker,dest=artifacts/${{ matrix.platform_slug }}.tar
          build-args: |
            VERSION=${{ needs.image_metadata.outputs.version_value }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ needs.image_metadata.outputs.git_branch }}
            GIT_TAG=${{ needs.image_metadata.outputs.git_tag }}
            GIT_TREE_STATE=clean
            BUILD_TIME=${{ needs.image_metadata.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare / Setup Trivy
        uses: ./.github/actions/setup-trivy

      - name: Verify / Generate Trivy SARIF
        id: image_scan_sarif
        uses: ./.github/actions/trivy-run
        with:
          scan-type: image
          input: artifacts/${{ matrix.platform_slug }}.tar
          scanners: vuln
          pkg-types: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          format: sarif
          output: artifacts/trivy-${{ matrix.platform_slug }}.sarif
          exit-code: "0"

      - name: Report / Upload Trivy SARIF
        if: always() && hashFiles(format('artifacts/trivy-{0}.sarif', matrix.platform_slug)) != ''
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: artifacts/trivy-${{ matrix.platform_slug }}.sarif
          category: trivy-image-${{ matrix.platform_slug }}

      - name: Verify / Gate on Trivy findings
        id: image_scan_gate
        uses: ./.github/actions/trivy-run
        with:
          scan-type: image
          input: artifacts/${{ matrix.platform_slug }}.tar
          scanners: vuln
          pkg-types: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          format: table
          output: artifacts/trivy-${{ matrix.platform_slug }}.txt
          exit-code: "1"

      - name: Report / Publish results
        if: always()
        uses: ./.github/actions/report-job
        with:
          title: Publish / Build And Scan (${{ matrix.platform_slug }})
          summary: |
            | Item | Value |
            | --- | --- |
            | Archive build | ${{ steps.build_scan_image.outcome }} |
            | SARIF export | ${{ steps.image_scan_sarif.outcome }} |
            | Severity gate | ${{ steps.image_scan_gate.outcome }} |
            | Platform | `${{ matrix.platform }}` |
            | Artifacts | `publish-image-scan-${{ matrix.platform_slug }}` |
          artifact-name: publish-image-scan-${{ matrix.platform_slug }}
          artifact-path: artifacts/

  build_image:
    name: Publish / Build And Package Image
    needs: [image_metadata, image_scan]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      artifact_name: ${{ needs.image_metadata.outputs.artifact_name }}
      image_ref: ${{ steps.record.outputs.image_ref }}
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Workspace
        uses: ./.github/actions/prepare-workspace
        with:
          setup-go: "false"
          setup-just: "false"

      - name: Prepare / Setup QEMU
        if: needs.image_metadata.outputs.requires_qemu == 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Prepare / Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Prepare / Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build / Build image
        id: build_image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          target: runner
          platforms: ${{ needs.image_metadata.outputs.build_platforms }}
          push: true
          sbom: true
          tags: ${{ needs.image_metadata.outputs.tags }}
          build-args: |
            VERSION=${{ needs.image_metadata.outputs.version_value }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ needs.image_metadata.outputs.git_branch }}
            GIT_TAG=${{ needs.image_metadata.outputs.git_tag }}
            GIT_TREE_STATE=clean
            BUILD_TIME=${{ needs.image_metadata.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build / Record build metadata
        id: record
        run: |
          set -euo pipefail

          image_ref='${{ needs.image_metadata.outputs.image_name }}@${{ steps.build_image.outputs.digest }}'

          {
            printf 'primary_image=%s\n' '${{ needs.image_metadata.outputs.primary_image }}'
            printf 'digest=%s\n' '${{ steps.build_image.outputs.digest }}'
            printf 'image_ref=%s\n' "$image_ref"
          } > artifacts/image.txt

          printf 'image_ref=%s\n' "$image_ref" >> "$GITHUB_OUTPUT"

      - name: Build / Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          push-to-registry: true
          subject-name: ${{ needs.image_metadata.outputs.image_name }}
          subject-digest: ${{ steps.build_image.outputs.digest }}

      - name: Prepare / Setup Trivy
        uses: ./.github/actions/setup-trivy

      - name: Build / Generate SBOM
        uses: ./.github/actions/trivy-run
        with:
          scan-type: image
          image-ref: ${{ steps.record.outputs.image_ref }}
          scanners: vuln
          format: spdx-json
          output: artifacts/sbom.spdx.json
          exit-code: "0"

      - name: Build / Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: v3.0.5

      - name: Build / Sign image
        env:
          IMAGE_REF: ${{ steps.record.outputs.image_ref }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Build / Record deploy metadata
        env:
          META_REPOSITORY: ${{ github.repository }}
          META_WORKFLOW: ${{ github.workflow }}
          META_RUN_ID: ${{ github.run_id }}
          META_RUN_ATTEMPT: ${{ github.run_attempt }}
          META_EVENT_NAME: ${{ github.event_name }}
          META_SOURCE_REPOSITORY: ${{ needs.image_metadata.outputs.source_repository }}
          META_SOURCE_TYPE: ${{ needs.image_metadata.outputs.source_type }}
          META_SOURCE_REF: ${{ needs.image_metadata.outputs.source_ref }}
          META_SOURCE_REF_NAME: ${{ needs.image_metadata.outputs.source_ref_name }}
          META_SOURCE_SHA: ${{ needs.image_metadata.outputs.source_sha }}
          META_IMAGE_NAME: ${{ needs.image_metadata.outputs.image_name }}
          META_IMAGE_TAG: ${{ needs.image_metadata.outputs.primary_image }}
          META_IMAGE_DIGEST: ${{ steps.build_image.outputs.digest }}
          META_IMAGE_REF: ${{ steps.record.outputs.image_ref }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = {
              "repository": os.environ["META_REPOSITORY"],
              "workflow": os.environ["META_WORKFLOW"],
              "run_id": int(os.environ["META_RUN_ID"]),
              "run_attempt": int(os.environ["META_RUN_ATTEMPT"]),
              "event_name": os.environ["META_EVENT_NAME"],
              "source_repository": os.environ["META_SOURCE_REPOSITORY"],
              "source_type": os.environ["META_SOURCE_TYPE"],
              "source_ref": os.environ["META_SOURCE_REF"],
              "source_ref_name": os.environ["META_SOURCE_REF_NAME"],
              "source_sha": os.environ["META_SOURCE_SHA"],
              "image_name": os.environ["META_IMAGE_NAME"],
              "image_tag": os.environ["META_IMAGE_TAG"],
              "image_digest": os.environ["META_IMAGE_DIGEST"],
              "image_ref": os.environ["META_IMAGE_REF"],
              "push_image": True,
          }

          Path("artifacts/publish-metadata.json").write_text(
              json.dumps(metadata, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Report / Publish results
        if: always()
        uses: ./.github/actions/report-job
        with:
          title: Publish / Build And Package Image
          summary: |
            | Item | Value |
            | --- | --- |
            | Build result | ${{ steps.build_image.outcome }} |
            | Image gate | passed after per-platform Trivy scans |
            | Primary image | `${{ needs.image_metadata.outputs.primary_image }}` |
            | Image ref | `${{ steps.record.outputs.image_ref }}` |
            | Source | `${{ needs.image_metadata.outputs.source_type }}:${{ needs.image_metadata.outputs.source_ref_name }}` |
            | Artifact bundle | `${{ needs.image_metadata.outputs.artifact_name }}` |
          artifact-name: ${{ needs.image_metadata.outputs.artifact_name }}
          artifact-path: artifacts/

      - name: Report / Upload publish metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publish-metadata
          path: artifacts/publish-metadata.json
          retention-days: 14
