name: Release
run-name: Release / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: ./.github/workflows/reusable-semver-release.yml
    with:
      source_branch: ${{ github.ref_name }}
      source_sha: ${{ github.sha }}
    secrets:
      release_token: ${{ secrets.RELEASE_TOKEN }}
