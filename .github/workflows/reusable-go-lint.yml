name: Reusable Go Lint

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Uploaded artifact bundle name.
        required: false
        type: string
        default: lint-logs
      retention_days:
        description: Artifact retention period in days.
        required: false
        type: number
        default: 14

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify / Lint
        uses: ./.github/actions/run-lint
        with:
          artifact-name: ${{ inputs.artifact_name }}
          retention-days: ${{ inputs.retention_days }}
