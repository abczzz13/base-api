name: Security
run-name: "Security / ${{ github.event_name }} / ${{ github.event_name == 'pull_request' && format('PR #{0} ({1})', github.event.pull_request.number, github.head_ref) || github.ref_name }}"

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  repo_security:
    name: Security / Repo Scans
    uses: ./.github/workflows/reusable-repo-security.yml
    with:
      artifact_name: security-repo-scans
      retention_days: 14

  dependency_review:
    name: Security / Dependency Review
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Workspace
        uses: ./.github/actions/prepare-workspace
        with:
          setup-go: "false"
          setup-just: "false"

      - name: Verify / Review dependency changes
        id: dependency_review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      - name: Report / Publish results
        if: always()
        uses: ./.github/actions/report-job
        with:
          title: Security / Dependency Review
          summary: |
            | Item | Result |
            | --- | --- |
            | Dependency review | ${{ steps.dependency_review.outcome }} |

  trivy_config:
    name: Security / Trivy Config Scan
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/reusable-trivy-config-scan.yml
    with:
      title: Security / Trivy Config Scan
      scan_ref: .
      skip_dirs: vendor,internal/dbsqlc,internal/publicoas,internal/infraoas,.bin,build
      severity: HIGH,CRITICAL
      sarif_file: artifacts/trivy-config.sarif
      gate_file: artifacts/trivy-config.txt
      artifact_name: security-trivy-config
      sarif_category: trivy-config
      upload_sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      retention_days: 14

  codeql:
    name: Security / CodeQL
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Prepare / Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare / Workspace
        uses: ./.github/actions/prepare-workspace

      - name: Prepare / Initialize CodeQL
        uses: github/codeql-action/init@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          languages: go
          config-file: ./.github/codeql/codeql-config.yml

      - name: Verify / Build for CodeQL
        id: codeql_build
        run: |
          set -euo pipefail
          just build-go 2>&1 | tee artifacts/codeql-build.log

      - name: Verify / Analyze with CodeQL
        id: codeql_analyze
        uses: github/codeql-action/analyze@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4

      - name: Report / Publish results
        if: always()
        uses: ./.github/actions/report-job
        with:
          title: Security / CodeQL
          summary: |
            | Item | Result |
            | --- | --- |
            | Build | ${{ steps.codeql_build.outcome }} |
            | Analyze | ${{ steps.codeql_analyze.outcome }} |
            | Artifacts | `security-codeql-build` |
          artifact-name: security-codeql-build
          artifact-path: artifacts/
