version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: vendor

linters:
  default: none
  enable:
    - govet
    - gosec
    - staticcheck
    - ineffassign
    - errcheck
    - errorlint
    - unused
    - misspell
  exclusions:
    generated: strict

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/abczzz13/base-api
  exclusions:
    generated: strict

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
