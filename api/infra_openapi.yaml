openapi: 3.0.3
info:
  title: Base API Infra
  version: 0.1.0
paths:
  /livez:
    x-ogen-operation-group: Infra
    get:
      operationId: getLivez
      summary: Liveness probe endpoint
      responses:
        "200":
          description: Service process is alive
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
        default:
          $ref: "#/components/responses/DefaultError"
  /readyz:
    x-ogen-operation-group: Infra
    get:
      operationId: getReadyz
      summary: Readiness probe endpoint
      responses:
        "200":
          description: Service is ready to accept traffic
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
        default:
          $ref: "#/components/responses/DefaultError"
  /healthz:
    x-ogen-operation-group: Infra
    get:
      operationId: getHealthz
      summary: Service health summary endpoint
      responses:
        "200":
          description: Service health summary
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/DefaultError"
components:
  headers:
    RequestId:
      description: Request ID used to correlate logs, errors, and audit records.
      schema:
        type: string
  responses:
    DefaultError:
      description: Error response
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ProbeResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    HealthResponse:
      type: object
      required:
        - status
        - version
        - timestamp
        - environment
      properties:
        status:
          type: string
        version:
          type: string
        timestamp:
          type: string
        environment:
          type: string
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
