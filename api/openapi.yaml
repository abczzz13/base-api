openapi: 3.0.3
info:
  title: Base API
  version: 0.1.0
paths:
  /healthz:
    x-ogen-operation-group: Base
    get:
      operationId: getHealthz
      summary: Public health endpoint
      responses:
        "200":
          description: Service health status
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/DefaultError"
  /weather/current:
    x-ogen-operation-group: Weather
    get:
      operationId: getCurrentWeather
      summary: Current weather for a location
      parameters:
        - in: query
          name: location
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Current weather conditions
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentWeatherResponse"
        default:
          $ref: "#/components/responses/DefaultError"
components:
  headers:
    RequestId:
      description: Request ID used to correlate logs, errors, and audit records.
      schema:
        type: string
  responses:
    DefaultError:
      description: Error response
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    CurrentWeatherResponse:
      type: object
      required:
        - provider
        - location
        - condition
        - temperatureC
        - observedAt
      properties:
        provider:
          type: string
        location:
          type: string
        condition:
          type: string
        temperatureC:
          type: number
          format: double
        observedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
