services:
  api:
    image: ghcr.io/abczzz13/base-api:${VERSION:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        GIT_TAG: ${GIT_TAG:-unknown}
        GIT_TREE_STATE: ${GIT_TREE_STATE:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      API_ADDR: ${API_ADDR:-0.0.0.0:8080}
      API_RATE_LIMIT_VALKEY_ADDRS: valkey:6379
      DB_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-base_api}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-base_api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-base_api}"]
      interval: 5s
      timeout: 5s
      retries: 10
    init: true
    restart: unless-stopped
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    init: true
    restart: unless-stopped
