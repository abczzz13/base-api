services:
  api:
    image: ghcr.io/abczzz13/base-api:${VERSION:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      API_ADDR: ${API_ADDR:-0.0.0.0:8080}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
