<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Base API Docs</title>
  <link rel="stylesheet" href="/swagger-ui/swagger-ui.css">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #f5f5f5; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="/swagger-ui/swagger-ui-bundle.js"></script>
  <script src="/swagger-ui/swagger-ui-standalone-preset.js"></script>
  <script>
    window.addEventListener("load", function() {
      const infraSpecURL = new URL("./openapi/infra.yaml", window.location.href).toString();
      const publicSpecURL = new URL("./openapi/public.yaml", window.location.href).toString();
      const weatherSpecURL = new URL("./openapi/weather.yaml", window.location.href).toString();

      window.ui = SwaggerUIBundle({
        dom_id: "#swagger-ui",
        deepLinking: true,
        urls: [
          { url: publicSpecURL, name: "Public Core API" },
          { url: weatherSpecURL, name: "Public Weather API" },
          { url: infraSpecURL, name: "Infra API" }
        ],
        "urls.primaryName": "Public Core API",
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        validatorUrl: null,
        layout: "StandaloneLayout"
      });
    });
  </script>
</body>
</html>
